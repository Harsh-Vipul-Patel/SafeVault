<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1500" viewBox="0 0 2200 1500">
  <defs>
    <style>
      .title { font: 700 18px Arial, sans-serif; fill: #0d1b2a; }
      .h1 { font: 700 24px Arial, sans-serif; fill: #0d1b2a; }
      .col { font: 13px Arial, sans-serif; fill: #1f2937; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
      .line { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .lbl { font: 12px Arial, sans-serif; fill: #334155; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
  </defs>

  <text x="40" y="40" class="h1">Suraksha Bank ER Diagram (Oracle 21c)</text>
  <text x="40" y="65" class="lbl">Core entities, security, approvals, loan, audit, notifications, and queue modules</text>

  <!-- Row 1 -->
  <rect x="40" y="90" width="300" height="150" class="box" />
  <text x="55" y="115" class="title">USERS</text>
  <text x="55" y="138" class="col">PK user_id RAW(16)</text>
  <text x="55" y="158" class="col">username UQ, password_hash</text>
  <text x="55" y="178" class="col">session_token, user_type</text>
  <text x="55" y="198" class="col">failed_attempts, is_locked</text>

  <rect x="390" y="90" width="300" height="150" class="box" />
  <text x="405" y="115" class="title">BRANCHES</text>
  <text x="405" y="138" class="col">PK branch_id</text>
  <text x="405" y="158" class="col">ifsc_code UQ, branch_name</text>
  <text x="405" y="178" class="col">manager_emp_id FK</text>

  <rect x="740" y="90" width="320" height="150" class="box" />
  <text x="755" y="115" class="title">EMPLOYEES</text>
  <text x="755" y="138" class="col">PK employee_id</text>
  <text x="755" y="158" class="col">FK user_id -> USERS</text>
  <text x="755" y="178" class="col">FK branch_id -> BRANCHES</text>
  <text x="755" y="198" class="col">role (TELLER/MANAGER/ADMIN/LOAN)</text>

  <rect x="1120" y="90" width="360" height="150" class="box" />
  <text x="1135" y="115" class="title">DUAL_APPROVAL_QUEUE</text>
  <text x="1135" y="138" class="col">PK queue_id RAW</text>
  <text x="1135" y="158" class="col">FK requested_by -> USERS</text>
  <text x="1135" y="178" class="col">FK reviewed_by -> EMPLOYEES</text>
  <text x="1135" y="198" class="col">operation_type, payload_json, status</text>

  <rect x="1520" y="90" width="340" height="150" class="box" />
  <text x="1535" y="115" class="title">SYSTEM_CONFIG</text>
  <text x="1535" y="138" class="col">PK config_key</text>
  <text x="1535" y="158" class="col">config_value, description</text>

  <!-- Row 2 -->
  <rect x="40" y="320" width="320" height="170" class="box" />
  <text x="55" y="345" class="title">CUSTOMERS</text>
  <text x="55" y="368" class="col">PK customer_id</text>
  <text x="55" y="388" class="col">FK user_id -> USERS</text>
  <text x="55" y="408" class="col">full_name, email, phone</text>
  <text x="55" y="428" class="col">kyc_status, pan_number</text>

  <rect x="390" y="320" width="300" height="170" class="box" />
  <text x="405" y="345" class="title">ACCOUNT_TYPES</text>
  <text x="405" y="368" class="col">PK type_id</text>
  <text x="405" y="388" class="col">type_name, interest_rate</text>
  <text x="405" y="408" class="col">min_balance, max_withdrawal</text>

  <rect x="740" y="320" width="340" height="170" class="box" />
  <text x="755" y="345" class="title">ACCOUNTS</text>
  <text x="755" y="368" class="col">PK account_id, account_number UQ</text>
  <text x="755" y="388" class="col">FK customer_id -> CUSTOMERS</text>
  <text x="755" y="408" class="col">FK account_type_id -> ACCOUNT_TYPES</text>
  <text x="755" y="428" class="col">FK home_branch_id -> BRANCHES</text>
  <text x="755" y="448" class="col">balance, status, minimum_balance</text>

  <rect x="1120" y="320" width="360" height="170" class="box" />
  <text x="1135" y="345" class="title">TRANSACTIONS</text>
  <text x="1135" y="368" class="col">PK transaction_id, transaction_ref UQ</text>
  <text x="1135" y="388" class="col">FK account_id -> ACCOUNTS</text>
  <text x="1135" y="408" class="col">transaction_type, amount, balance_after</text>
  <text x="1135" y="428" class="col">linked_transfer_id, initiated_by</text>

  <rect x="1520" y="320" width="420" height="170" class="box" />
  <text x="1535" y="345" class="title">PENDING_EXTERNAL_TRANSFERS</text>
  <text x="1535" y="368" class="col">PK transfer_id RAW</text>
  <text x="1535" y="388" class="col">FK source_account_id -> ACCOUNTS</text>
  <text x="1535" y="408" class="col">amount, destination_ifsc, destination_account</text>
  <text x="1535" y="428" class="col">transfer_mode, status, settlement_reference</text>

  <!-- Row 3 -->
  <rect x="40" y="560" width="360" height="160" class="box" />
  <text x="55" y="585" class="title">LOAN_APPLICATIONS</text>
  <text x="55" y="608" class="col">PK loan_app_id RAW</text>
  <text x="55" y="628" class="col">FK customer_id -> CUSTOMERS</text>
  <text x="55" y="648" class="col">FK branch_id -> BRANCHES</text>
  <text x="55" y="668" class="col">requested_amount, linked_account_id, status</text>

  <rect x="430" y="560" width="320" height="160" class="box" />
  <text x="445" y="585" class="title">LOAN_ACCOUNTS</text>
  <text x="445" y="608" class="col">PK loan_account_id</text>
  <text x="445" y="628" class="col">FK loan_app_id -> LOAN_APPLICATIONS</text>
  <text x="445" y="648" class="col">disbursed_amount, outstanding_principal</text>

  <rect x="780" y="560" width="320" height="160" class="box" />
  <text x="795" y="585" class="title">EMI_SCHEDULE</text>
  <text x="795" y="608" class="col">PK emi_id</text>
  <text x="795" y="628" class="col">FK loan_account_id -> LOAN_ACCOUNTS</text>
  <text x="795" y="648" class="col">due_date, emi_amount, status</text>

  <rect x="1130" y="560" width="320" height="160" class="box" />
  <text x="1145" y="585" class="title">LOAN_PAYMENTS</text>
  <text x="1145" y="608" class="col">PK payment_id</text>
  <text x="1145" y="628" class="col">FK loan_account_id -> LOAN_ACCOUNTS</text>
  <text x="1145" y="648" class="col">FK emi_id -> EMI_SCHEDULE</text>

  <rect x="1480" y="560" width="380" height="160" class="box" />
  <text x="1495" y="585" class="title">AUDIT_LOG</text>
  <text x="1495" y="608" class="col">PK audit_id</text>
  <text x="1495" y="628" class="col">table_name, operation, changed_by</text>
  <text x="1495" y="648" class="col">old_value_json, new_value_json</text>
  <text x="1495" y="668" class="col">violation_flag, changed_at</text>

  <!-- Row 4 -->
  <rect x="40" y="790" width="350" height="160" class="box" />
  <text x="55" y="815" class="title">SERVICE_REQUESTS</text>
  <text x="55" y="838" class="col">PK sr_id</text>
  <text x="55" y="858" class="col">FK customer_id -> CUSTOMERS</text>
  <text x="55" y="878" class="col">FK branch_id -> BRANCHES</text>
  <text x="55" y="898" class="col">status, assigned_to, resolved_by</text>

  <rect x="420" y="790" width="330" height="160" class="box" />
  <text x="435" y="815" class="title">SERVICE_QUEUE</text>
  <text x="435" y="838" class="col">PK queue_id</text>
  <text x="435" y="858" class="col">token_number, customer_name</text>
  <text x="435" y="878" class="col">service_type, priority, status</text>
  <text x="435" y="898" class="col">served_by, served_at, notes</text>

  <rect x="780" y="790" width="340" height="160" class="box" />
  <text x="795" y="815" class="title">NOTIFICATION_LOG</text>
  <text x="795" y="838" class="col">PK notif_id</text>
  <text x="795" y="858" class="col">FK customer_id -> CUSTOMERS</text>
  <text x="795" y="878" class="col">FK user_id -> USERS</text>
  <text x="795" y="898" class="col">trigger_event, channel, status</text>

  <rect x="1160" y="790" width="330" height="160" class="box" />
  <text x="1175" y="815" class="title">OTPS</text>
  <text x="1175" y="838" class="col">PK otp_id</text>
  <text x="1175" y="858" class="col">FK user_id -> USERS</text>
  <text x="1175" y="878" class="col">purpose, otp_hash, expires_at</text>
  <text x="1175" y="898" class="col">attempts, status</text>

  <rect x="1520" y="790" width="360" height="160" class="box" />
  <text x="1535" y="815" class="title">KYC_DETAILS</text>
  <text x="1535" y="838" class="col">PK kyc_id</text>
  <text x="1535" y="858" class="col">FK customer_id -> CUSTOMERS</text>
  <text x="1535" y="878" class="col">verified_by -> EMPLOYEES</text>
  <text x="1535" y="898" class="col">document_type, kyc_status</text>

  <!-- Row 5 -->
  <rect x="40" y="1020" width="360" height="160" class="box" />
  <text x="55" y="1045" class="title">SAVED_BENEFICIARIES</text>
  <text x="55" y="1068" class="col">PK beneficiary_id</text>
  <text x="55" y="1088" class="col">FK customer_id -> CUSTOMERS</text>
  <text x="55" y="1108" class="col">ifsc_code, account_number, status</text>

  <rect x="430" y="1020" width="360" height="160" class="box" />
  <text x="445" y="1045" class="title">STANDING_INSTRUCTIONS</text>
  <text x="445" y="1068" class="col">PK instruction_id</text>
  <text x="445" y="1088" class="col">FK customer_id -> CUSTOMERS</text>
  <text x="445" y="1108" class="col">FK debit_account_id -> ACCOUNTS</text>
  <text x="445" y="1128" class="col">instruction_type, amount, status</text>

  <rect x="820" y="1020" width="320" height="160" class="box" />
  <text x="835" y="1045" class="title">CHEQUE_BOOKS</text>
  <text x="835" y="1068" class="col">PK book_id</text>
  <text x="835" y="1088" class="col">FK account_id -> ACCOUNTS</text>
  <text x="835" y="1108" class="col">start_cheque_number, end_cheque_number</text>

  <rect x="1170" y="1020" width="320" height="160" class="box" />
  <text x="1185" y="1045" class="title">CHEQUES</text>
  <text x="1185" y="1068" class="col">PK cheque_id</text>
  <text x="1185" y="1088" class="col">FK book_id -> CHEQUE_BOOKS</text>
  <text x="1185" y="1108" class="col">drawee_account_id, payee_account_id</text>

  <rect x="1520" y="1020" width="360" height="160" class="box" />
  <text x="1535" y="1045" class="title">STOP_PAYMENT_INSTRUCTIONS</text>
  <text x="1535" y="1068" class="col">PK stop_id</text>
  <text x="1535" y="1088" class="col">FK account_id -> ACCOUNTS</text>
  <text x="1535" y="1108" class="col">FK book_id -> CHEQUE_BOOKS</text>

  <!-- Relationships -->
  <path d="M340 150 L390 150" class="line" /><text x="352" y="142" class="lbl">1:N</text>
  <path d="M690 150 L740 150" class="line" /><text x="702" y="142" class="lbl">1:N</text>
  <path d="M200 240 L200 320" class="line" /><text x="206" y="285" class="lbl">1:1</text>
  <path d="M540 240 L900 320" class="line" /><text x="650" y="290" class="lbl">branch scope</text>
  <path d="M200 490 L900 320" class="line" /><text x="480" y="410" class="lbl">customer_id</text>
  <path d="M540 490 L900 320" class="line" /><text x="620" y="360" class="lbl">type_id</text>
  <path d="M1080 400 L1120 400" class="line" /><text x="1088" y="392" class="lbl">1:N</text>
  <path d="M900 490 L1700 320" class="line" /><text x="1270" y="355" class="lbl">source_account_id</text>
  <path d="M220 720 L560 720" class="line" /><text x="360" y="712" class="lbl">1:1</text>
  <path d="M750 640 L780 640" class="line" /><text x="756" y="632" class="lbl">1:N</text>
  <path d="M1100 640 L1130 640" class="line" /><text x="1106" y="632" class="lbl">1:N</text>
  <path d="M220 490 L220 560" class="line" /><text x="226" y="530" class="lbl">customer_id</text>
  <path d="M220 490 L220 790" class="line" /><text x="226" y="660" class="lbl">customer_id</text>
  <path d="M220 490 L220 1020" class="line" /><text x="226" y="930" class="lbl">customer_id</text>
  <path d="M900 490 L900 790" class="line" /><text x="906" y="660" class="lbl">events</text>
  <path d="M900 490 L900 1020" class="line" /><text x="906" y="930" class="lbl">debit account</text>
  <path d="M970 1100 L1170 1100" class="line" /><text x="1040" y="1092" class="lbl">book_id</text>
  <path d="M970 1120 L1520 1120" class="line" /><text x="1230" y="1112" class="lbl">book/account</text>
  <path d="M340 150 L1160 790" class="line" /><text x="690" y="500" class="lbl">user_id</text>
  <path d="M340 150 L1120 150" class="line" /><text x="720" y="142" class="lbl">requested_by</text>

  <text x="40" y="1455" class="lbl">Figure 1. ER diagram for Suraksha Bank core + extension modules used in CSE401 project documentation.</text>
</svg>
