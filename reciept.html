<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethelred Bank | Enterprise System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- ENTERPRISE DESIGN SYSTEM --- */
        :root {
            --bg-color: #F5F7FA;
            --accent-primary: #971237;
            --text-dark: #0F172A;
            --text-muted: #64748B;
            --shadow-light: #ffffff;
            --shadow-dark: #d8e0eb;
            --danger: #dc2626;
            --success: #16a34a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); min-height: 100vh; overflow-x: hidden; }

        /* Navigation */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 4rem; background-color: var(--bg-color); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .logo { font-weight: 700; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .controls { display: flex; gap: 1.5rem; align-items: center; }

        /* Tactile UI Elements */
        .btn { padding: 0.8rem 1.5rem; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn:active { transform: translateY(2px); }
        
        .btn-primary { background: var(--accent-primary); color: white; box-shadow: 6px 6px 15px rgba(151, 18, 55, 0.2), -6px -6px 15px var(--shadow-light); }
        .btn-primary:active { box-shadow: inset 4px 4px 10px rgba(0, 0, 0, 0.3), inset -4px -4px 10px rgba(255, 255, 255, 0.1); }
        
        .btn-secondary { background: var(--bg-color); color: var(--text-dark); box-shadow: 6px 6px 15px var(--shadow-dark), -6px -6px 15px var(--shadow-light); }
        .btn-secondary:active { box-shadow: inset 4px 4px 10px var(--shadow-dark), inset -4px -4px 10px var(--shadow-light); }

        .skeuo-input { width: 100%; padding: 1rem; border-radius: 12px; border: none; background: var(--bg-color); box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); color: var(--text-dark); outline: none; margin-bottom: 1.5rem; font-size: 1rem; }
        .skeuo-select { padding: 0.8rem 1rem; border-radius: 12px; border: none; background: var(--bg-color); box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); color: var(--text-dark); outline: none; font-weight: 600; cursor: pointer; }

        /* Main Layout */
        .app-container { padding: 3rem 4rem; max-width: 1440px; margin: 0 auto; }
        .view-header { margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: flex-end; }
        .view-header h1 { font-size: 2.5rem; color: #111; line-height: 1.1; }
        .view-header p { color: var(--text-muted); margin-top: 0.5rem; }

        /* Bento Grid */
        .bento-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .bento-card { background: var(--bg-color); border-radius: 24px; padding: 2rem; box-shadow: 12px 12px 24px var(--shadow-dark), -12px -12px 24px var(--shadow-light); cursor: pointer; transition: all 0.3s ease; }
        .bento-card:hover { transform: translateY(-5px); box-shadow: 16px 16px 30px var(--shadow-dark), -16px -16px 30px var(--shadow-light); }
        .bento-card:active { transform: translateY(2px); box-shadow: inset 8px 8px 16px var(--shadow-dark), inset -8px -8px 16px var(--shadow-light); }
        .bento-icon { font-size: 2.5rem; margin-bottom: 1rem; text-shadow: 3px 3px 6px rgba(0,0,0,0.15); }
        .bento-card h3 { font-size: 1.2rem; margin-bottom: 0.5rem; }
        .bento-card p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; }

        /* Forms & Functional Views */
        .action-panel { background: var(--bg-color); border-radius: 24px; padding: 3rem; box-shadow: 12px 12px 24px var(--shadow-dark), -12px -12px 24px var(--shadow-light); max-width: 800px; margin: 0 auto; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        
        /* Data Tables */
        .data-table-container { background: var(--bg-color); border-radius: 24px; padding: 2rem; box-shadow: 12px 12px 24px var(--shadow-dark), -12px -12px 24px var(--shadow-light); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 1rem; border-bottom: 2px solid var(--shadow-dark); color: var(--text-muted); font-weight: 600; }
        td { padding: 1rem; border-bottom: 1px solid var(--shadow-dark); }
        .status-badge { padding: 0.4rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .status-pending { background: #fef08a; color: #854d0e; }
        .status-approved { background: #bbf7d0; color: #166534; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="app.navigate('dashboard')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 22H22L12 2Z" fill="#111" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
            </svg>
            <span>AETHELRED SYSTEM</span>
        </div>
        
        <div class="controls">
            <span id="user-identity" style="font-weight: 600; color: var(--text-muted);"></span>
            <select id="role-selector" class="skeuo-select" onchange="app.switchRole(this.value)">
                <option value="customer">Customer Portal</option>
                <option value="teller">Teller Terminal</option>
                <option value="branch_manager">Branch Manager</option>
                <option value="manager">Regional Manager</option>
                <option value="loan_manager">Loan Manager</option>
                <option value="system_admin">System Admin</option>
            </select>
            <button class="btn btn-secondary" onclick="app.navigate('dashboard')">Dashboard</button>
        </div>
    </nav>

    <main class="app-container" id="app-viewport">
        </main>

    <script>
        /**
         * ENTERPRISE FRONTEND ARCHITECTURE
         * Handles State, Routing, and View Rendering.
         */
        const app = {
            state: {
                currentRole: 'customer',
                currentView: 'dashboard',
                // Mock Database for UI demonstration
                userProfiles: {
                    customer: { name: "Eliza Reed", id: "CUST-8821" },
                    teller: { name: "Marcus Thorne", id: "TEL-102" },
                    branch_manager: { name: "Sarah Jenkins", id: "BM-44" },
                    manager: { name: "David Vance", id: "RM-09" },
                    loan_manager: { name: "Priya Patel", id: "LM-31" },
                    system_admin: { name: "Root Access", id: "SYS-01" }
                }
            },

            // --- VIEW CONFIGURATIONS & MENUS ---
            roleConfigs: {
                customer: {
                    title: "PERSONAL<br>LEDGER.",
                    desc: "Manage your assets, transfer funds, and review history.",
                    menu: [
                        { id: "transfer", icon: "💸", title: "Fund Transfer", desc: "Instant domestic and wire transfers." },
                        { id: "history", icon: "📊", title: "Transaction History", desc: "View detailed account statements." },
                        { id: "cards", icon: "💳", title: "Card Control", desc: "Manage physical and virtual cards." }
                    ]
                },
                teller: {
                    title: "TELLER<br>OPERATIONS.",
                    desc: "Process physical cash, cheques, and verify identities.",
                    menu: [
                        { id: "deposit", icon: "💵", title: "Deposit Cash", desc: "Process cash into customer accounts." },
                        { id: "withdraw", icon: "🏧", title: "Withdrawal", desc: "Authorize cash out." },
                        { id: "kyc", icon: "🆔", title: "Verify KYC", desc: "Check biometric credentials." }
                    ]
                },
                branch_manager: {
                    title: "BRANCH<br>OVERSIGHT.",
                    desc: "Authorize overrides, manage liquidity, and oversee tellers.",
                    menu: [
                        { id: "approvals", icon: "✅", title: "Pending Approvals", desc: "Review high-value transactions." },
                        { id: "roster", icon: "👥", title: "Staff Roster", desc: "Manage teller shifts." }
                    ]
                },
                manager: {
                    title: "REGIONAL<br>COMMAND.",
                    desc: "Aggregate analytics and risk assessments across branches.",
                    menu: [
                        { id: "reports", icon: "🌍", title: "Liquidity Reports", desc: "View regional branch health." },
                        { id: "audit", icon: "📋", title: "Audit Logs", desc: "Review compliance trails." }
                    ]
                },
                loan_manager: {
                    title: "CREDIT &<br>LENDING.",
                    desc: "Process applications and manage collateral risk.",
                    menu: [
                        { id: "apps", icon: "📄", title: "Review Applications", desc: "Assess new loan requests." },
                        { id: "disburse", icon: "💰", title: "Disburse Funds", desc: "Release approved loans." }
                    ]
                },
                system_admin: {
                    title: "SYSTEM<br>ARCHITECTURE.",
                    desc: "Manage access controls, infrastructure, and security.",
                    menu: [
                        { id: "access", icon: "⚙️", title: "Access Control", desc: "Manage user permissions." },
                        { id: "server", icon: "🖥️", title: "Server Status", desc: "Monitor node health." }
                    ]
                }
            },

            // --- CORE METHODS ---
            init() {
                this.updateIdentity();
                this.render();
            },

            switchRole(newRole) {
                this.state.currentRole = newRole;
                this.state.currentView = 'dashboard'; // Reset to dashboard on role change
                this.updateIdentity();
                this.render();
            },

            navigate(viewId) {
                this.state.currentView = viewId;
                this.render();
            },

            updateIdentity() {
                const user = this.state.userProfiles[this.state.currentRole];
                document.getElementById('user-identity').innerText = `${user.name} (${user.id})`;
            },

            // --- RENDERING ENGINE ---
            render() {
                const viewport = document.getElementById('app-viewport');
                viewport.innerHTML = ''; // Clear current view

                if (this.state.currentView === 'dashboard') {
                    viewport.innerHTML = this.views.renderDashboard(this.state.currentRole);
                } else {
                    // Route to specific functional views based on ID
                    const viewFunction = this.views[this.state.currentView];
                    if (viewFunction) {
                        viewport.innerHTML = viewFunction();
                    } else {
                        viewport.innerHTML = this.views.renderPlaceholder(this.state.currentView);
                    }
                }
            },

            // --- HTML TEMPLATES (The UI Components) ---
            views: {
                // The Main Bento Grid Dashboard for all roles
                renderDashboard(roleKey) {
                    const config = app.roleConfigs[roleKey];
                    let gridHtml = config.menu.map(item => `
                        <div class="bento-card" onclick="app.navigate('${item.id}')">
                            <div class="bento-icon">${item.icon}</div>
                            <h3>${item.title}</h3>
                            <p>${item.desc}</p>
                        </div>
                    `).join('');

                    return `
                        <div class="view-header">
                            <div>
                                <h1>${config.title}</h1>
                                <p>${config.desc}</p>
                            </div>
                        </div>
                        <div class="bento-grid">
                            ${gridHtml}
                        </div>
                    `;
                },

                // Functional View: Customer Transfer Form
                transfer() {
                    return `
                        <div class="view-header">
                            <div>
                                <h1>FUND<br>TRANSFER.</h1>
                                <p>Initiate a secure transfer via the ledger.</p>
                            </div>
                            <button class="btn btn-secondary" onclick="app.navigate('dashboard')">Back</button>
                        </div>
                        <div class="action-panel">
                            <form onsubmit="event.preventDefault(); alert('Transfer Initiated Securely.'); app.navigate('dashboard');">
                                <div class="form-group">
                                    <label>Recipient Account Number</label>
                                    <input type="text" class="skeuo-input" placeholder="e.g. 0001928374" required>
                                </div>
                                <div class="form-group">
                                    <label>Amount (USD)</label>
                                    <input type="number" class="skeuo-input" placeholder="0.00" required>
                                </div>
                                <div class="form-group">
                                    <label>Routing Method</label>
                                    <select class="skeuo-select" style="width: 100%; margin-bottom: 1.5rem;">
                                        <option>Instant Internal Transfer</option>
                                        <option>ACH Standard (1-3 Days)</option>
                                        <option>Wire Transfer</option>
                                    </select>
                                </div>
                                <button type="submit" class="btn btn-primary" style="width: 100%;">AUTHORIZE TRANSFER</button>
                            </form>
                        </div>
                    `;
                },

                // Functional View: Teller Deposit Form
                deposit() {
                    return `
                        <div class="view-header">
                            <div>
                                <h1>CASH<br>DEPOSIT.</h1>
                                <p>Process physical currency intake.</p>
                            </div>
                            <button class="btn btn-secondary" onclick="app.navigate('dashboard')">Back</button>
                        </div>
                        <div class="action-panel">
                            <form onsubmit="event.preventDefault(); alert('Cash deposited to vault ledger.'); app.navigate('dashboard');">
                                <div class="form-group">
                                    <label>Customer Account / Card Swipe</label>
                                    <input type="text" class="skeuo-input" placeholder="Scan or enter account..." required>
                                </div>
                                <div class="form-group">
                                    <label>Total Cash Amount Counted</label>
                                    <input type="number" class="skeuo-input" placeholder="$0.00" required>
                                </div>
                                <button type="submit" class="btn btn-primary" style="width: 100%;">COMMIT DEPOSIT</button>
                            </form>
                        </div>
                    `;
                },

                // Functional View: Branch Manager Approvals Table
                approvals() {
                    return `
                        <div class="view-header">
                            <div>
                                <h1>PENDING<br>APPROVALS.</h1>
                                <p>Transactions requiring manager override.</p>
                            </div>
                            <button class="btn btn-secondary" onclick="app.navigate('dashboard')">Back</button>
                        </div>
                        <div class="data-table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Transaction ID</th>
                                        <th>Initiator</th>
                                        <th>Type</th>
                                        <th>Amount</th>
                                        <th>Status</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>TXN-9921</td>
                                        <td>Teller 04</td>
                                        <td>Cash Withdrawal</td>
                                        <td>$15,000.00</td>
                                        <td><span class="status-badge status-pending">Pending</span></td>
                                        <td><button class="btn btn-primary" style="padding: 0.4rem 1rem; font-size: 0.8rem;" onclick="alert('Override Authorized')">Approve</button></td>
                                    </tr>
                                    <tr>
                                        <td>TXN-9945</td>
                                        <td>System</td>
                                        <td>Wire Transfer</td>
                                        <td>$125,000.00</td>
                                        <td><span class="status-badge status-pending">Pending KYC</span></td>
                                        <td><button class="btn btn-primary" style="padding: 0.4rem 1rem; font-size: 0.8rem;" onclick="alert('Override Authorized')">Approve</button></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    `;
                },

                // Fallback generator for views not explicitly coded above
                renderPlaceholder(viewId) {
                    return `
                        <div class="view-header">
                            <div>
                                <h1 style="text-transform: uppercase;">${viewId.replace('_', ' ')}<br>MODULE.</h1>
                                <p>System module securely loaded.</p>
                            </div>
                            <button class="btn btn-secondary" onclick="app.navigate('dashboard')">Back</button>
                        </div>
                        <div class="action-panel" style="text-align: center;">
                            <div class="bento-icon" style="font-size: 4rem;">⚙️</div>
                            <h3>Module Active</h3>
                            <p style="color: var(--text-muted); margin-top: 1rem;">This is a dynamic UI placeholder for the <strong>${viewId}</strong> function. In a full production environment, this space would render the specific forms, charts, or datagrid required for this action.</p>
                        </div>
                    `;
                }
            }
        };

        // Boot up the application
        window.onload = () => app.init();

    </script>
</body>
</html>
