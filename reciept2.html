<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethelred Bank | Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- COLOR PALETTE EXTRACTED FROM IMAGE --- */
        :root {
            /* Backgrounds */
            --bg-page: #f4f6fa;
            --bg-gradient: linear-gradient(135deg, #eaf5f2 0%, #f6f5fa 50%, #f4f7fb 100%);
            
            /* Typography */
            --text-heading: #0f142a; /* Deep navy/black */
            --text-body: #334155;
            
            /* Buttons */
            --btn-primary-bg: linear-gradient(90deg, #2b8c75, #43a88c);
            --btn-primary-hover: linear-gradient(90deg, #237562, #378e76);
            --btn-secondary: #f8fafc;
            
            /* Bento Box Pastels */
            --bento-purple: #e1d8f9;
            --bento-mint: #aee0cd;
            --bento-peach: #f1b39a;
            --bento-blue: #d0e3fc; /* For extra roles */
            --bento-yellow: #fce6b1; /* For extra roles */
            --bento-gray: #e2e8f0;   /* For extra roles */
            
            /* Tactile Shadows */
            --shadow-light: #ffffff;
            --shadow-dark: #d1d9e6;
            --card-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
            --pressed-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg-gradient); 
            color: var(--text-heading); 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        /* --- NAVIGATION --- */
        .navbar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 1.5rem 4rem; 
        }
        .logo { 
            font-weight: 800; 
            font-size: 1.1rem;
            letter-spacing: 0.5px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            cursor: pointer; 
        }
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-heading);
            font-weight: 500;
            font-size: 0.95rem;
        }
        .controls { 
            display: flex; 
            gap: 1rem; 
            align-items: center; 
        }

        /* --- BUTTONS & INPUTS --- */
        .btn { 
            padding: 0.7rem 1.5rem; 
            border-radius: 20px; 
            border: none; 
            font-weight: 600; 
            font-size: 0.9rem;
            cursor: pointer; 
            transition: all 0.2s ease; 
        }
        .btn:active { transform: translateY(2px); }
        
        .btn-primary { 
            background: var(--btn-primary-bg); 
            color: white; 
            box-shadow: 0 4px 15px rgba(43, 140, 117, 0.3);
        }
        .btn-primary:active {
            box-shadow: inset 2px 2px 8px rgba(0,0,0,0.2);
        }
        
        .btn-secondary { 
            background: var(--btn-secondary); 
            color: var(--text-heading); 
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); 
        }
        .btn-secondary:active { 
            box-shadow: var(--pressed-shadow); 
        }

        .role-selector {
            padding: 0.6rem 1rem;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
            font-weight: 600;
            outline: none;
            cursor: pointer;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.05);
        }

        /* --- LAYOUT --- */
        .app-container { 
            padding: 2rem 4rem; 
            max-width: 1440px; 
            margin: 0 auto; 
        }

        /* --- HERO SECTION --- */
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            margin-bottom: 4rem;
        }
        .hero-text h1 {
            font-size: 4.5rem;
            line-height: 1.05;
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: -1px;
        }
        .hero-text p {
            font-size: 1.2rem;
            color: var(--text-body);
            margin-bottom: 2rem;
            max-width: 85%;
            line-height: 1.5;
        }

        /* Floating Card Recreation */
        .hero-visual {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 400px;
        }
        .card-base {
            width: 480px;
            height: 300px;
            background: #caecd7;
            border-radius: 20px;
            position: absolute;
            transform: perspective(1000px) rotateX(45deg) rotateZ(-15deg) translateY(50px);
            box-shadow: 20px 30px 40px rgba(0,0,0,0.05);
        }
        .credit-card {
            width: 400px;
            height: 250px;
            background: #ffffff;
            border-radius: 16px;
            position: absolute;
            transform: perspective(1000px) rotateX(45deg) rotateZ(-15deg) translateY(-20px);
            box-shadow: 15px 25px 30px rgba(0,0,0,0.1), -5px -5px 15px rgba(255,255,255,0.8);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.4s ease;
        }
        .hero-visual:hover .credit-card {
            transform: perspective(1000px) rotateX(40deg) rotateZ(-10deg) translateY(-40px);
        }
        .cc-chip { width: 40px; height: 30px; background: #e0e0e0; border-radius: 6px; border: 1px solid #ccc; }
        .cc-num { font-size: 1.5rem; font-weight: 600; color: #1e3a8a; margin-top: 1rem; letter-spacing: 2px;}
        .cc-bottom { display: flex; justify-content: space-between; align-items: flex-end; color: #1e3a8a; font-weight: 600;}
        .cc-brand { width: 50px; height: 30px; background: radial-gradient(circle, #ff5f00 50%, #eb001b 50%); border-radius: 15px; }

        /* --- BENTO GRID --- */
        .bento-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 2rem; 
        }
        .bento-card { 
            border-radius: 24px; 
            padding: 2.5rem 2rem; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            position: relative;
            overflow: hidden;
            /* Subtler shadows for the colored boxes */
            box-shadow: 8px 8px 16px rgba(0,0,0,0.05), -8px -8px 16px rgba(255,255,255,0.6);
        }
        .bento-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 12px 12px 20px rgba(0,0,0,0.08), -12px -12px 20px rgba(255,255,255,0.8);
        }
        .bento-card:active { transform: translateY(2px); }
        
        /* Pastel Background Classes */
        .bg-purple { background-color: var(--bento-purple); }
        .bg-mint { background-color: var(--bento-mint); }
        .bg-peach { background-color: var(--bento-peach); }
        .bg-blue { background-color: var(--bento-blue); }
        .bg-yellow { background-color: var(--bento-yellow); }
        .bg-gray { background-color: var(--bento-gray); }

        .bento-icon { 
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem; 
            margin-bottom: 1.5rem; 
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.5), 2px 2px 5px rgba(0,0,0,0.05);
        }
        .bento-card h3 { 
            font-size: 1.3rem; 
            font-weight: 800;
            margin-bottom: 0.5rem; 
            color: var(--text-heading);
            text-transform: uppercase;
        }
        .bento-card p { 
            font-size: 0.85rem; 
            color: var(--text-body); 
            line-height: 1.5; 
            opacity: 0.8;
        }

        /* --- INTERNAL VIEWS (Forms/Tables) --- */
        .internal-view { display: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .view-header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: flex-end; }
        .panel { background: rgba(255,255,255,0.6); backdrop-filter: blur(10px); border-radius: 24px; padding: 3rem; box-shadow: var(--card-shadow); border: 1px solid rgba(255,255,255,0.8);}
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .input-tactile { width: 100%; padding: 1rem; border-radius: 12px; border: none; background: #f8fafc; box-shadow: inset 3px 3px 6px #e2e8f0, inset -3px -3px 6px #ffffff; outline: none; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="app.render('dashboard')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 22H22L12 2Z" fill="#0f142a" stroke="#0f142a" stroke-width="2" stroke-linejoin="round"/>
            </svg>
            <span>AETHELRED BANK</span>
        </div>
        
        <div class="nav-links">
            <a href="#">Accounts</a>
            <a href="#">Payments</a>
            <a href="#">Wealth</a>
            <a href="#">Security</a>
            <a href="#">Support</a>
        </div>
        
        <div class="controls">
            <select id="role-selector" class="role-selector" onchange="app.switchRole(this.value)">
                <option value="customer">Customer</option>
                <option value="teller">Teller</option>
                <option value="branch_manager">Branch Manager</option>
                <option value="manager">Manager</option>
                <option value="loan_manager">Loan Manager</option>
                <option value="system_admin">System Admin</option>
            </select>
            <button class="btn btn-secondary">LOG IN</button>
        </div>
    </nav>

    <main class="app-container">
        
        <div id="view-dashboard">
            <section class="hero">
                <div class="hero-text">
                    <h1 id="hero-title">PURE BANKING<br>CONTROL.</h1>
                    <p id="hero-desc">Your future, physically defined. Experience seamless, secure, and intuitive finances.</p>
                    <button class="btn btn-primary">OPEN AN ACCOUNT</button>
                </div>
                
                <div class="hero-visual">
                    <div class="card-base"></div>
                    <div class="credit-card">
                        <div style="display: flex; justify-content: space-between; font-weight: 600; color: #1e3a8a;">
                            <span>Debit</span>
                        </div>
                        <div>
                            <div class="cc-chip"></div>
                            <div class="cc-num">4512 •••• •••• 9876</div>
                        </div>
                        <div class="cc-bottom">
                            <div>ELIZA REED<br><span style="font-size: 0.7rem;">12/28</span></div>
                            <div class="cc-brand"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section>
                <div class="bento-grid" id="bento-grid">
                    </div>
            </section>
        </div>

        <div id="view-action" class="internal-view">
            <div class="view-header">
                <div class="hero-text">
                    <h1 id="action-title" style="font-size: 3rem;">ACTION</h1>
                    <p id="action-desc">Process secure request.</p>
                </div>
                <button class="btn btn-secondary" onclick="app.render('dashboard')">Close Module</button>
            </div>
            <div class="panel" style="max-width: 600px; margin: 0 auto;">
                <form onsubmit="event.preventDefault(); alert('Transaction securely committed to the ledger.'); app.render('dashboard');">
                    <div class="form-group">
                        <label>Target Account / Ledger ID</label>
                        <input type="text" class="input-tactile" placeholder="Enter details..." required>
                    </div>
                    <div class="form-group">
                        <label>Amount / Value</label>
                        <input type="number" class="input-tactile" placeholder="0.00" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">AUTHORIZE & COMMIT</button>
                </form>
            </div>
        </div>

    </main>

    <script>
        /**
         * System State & UI Rendering Engine
         */
        const app = {
            currentRole: 'customer',

            // Color sequence mapped to the image (Purple, Mint, Peach)
            colorSequence: ['bg-purple', 'bg-mint', 'bg-peach', 'bg-blue', 'bg-yellow', 'bg-gray'],

            // Database of roles and their specific bento grid items
            roles: {
                customer: {
                    title: "PURE BANKING<br>CONTROL.",
                    desc: "Your future, physically defined. Experience seamless, secure, and intuitive finances.",
                    actions: [
                        { icon: "🔒", title: "Ultra-Security", desc: "Lexend font praismoand 3D glass security rod proddless." },
                        { icon: "🪙", title: "Live Ledger", desc: "Lexend font sees realistic blockchain network coak threads." },
                        { icon: "⏱️", title: "Instant Transfers", desc: "Lexend font new sumitort instant transfers and date increation." }
                    ]
                },
                teller: {
                    title: "TELLER<br>TERMINAL.",
                    desc: "Hardware-level access for processing physical liquidity and client verification.",
                    actions: [
                        { icon: "💵", title: "Deposit Cash", desc: "Process physical currency into the live ledger." },
                        { icon: "🏧", title: "Withdrawal", desc: "Authorize physical payouts." },
                        { icon: "🆔", title: "Verify KYC", desc: "Scan 3D glass ID and biometric hardware." },
                        { icon: "📝", title: "Cheque Ops", desc: "Clear and digitally process paper cheques." }
                    ]
                },
                branch_manager: {
                    title: "BRANCH<br>OVERSIGHT.",
                    desc: "Manage regional liquidity, staff rosters, and high-value override authorizations.",
                    actions: [
                        { icon: "✅", title: "Authorize Flags", desc: "Approve high-value withdrawals and transfers." },
                        { icon: "vault", title: "Vault Access", desc: "Manage physical time-locks and reserves." },
                        { icon: "👥", title: "Staff Roster", desc: "Adjust teller permissions and shift keys." }
                    ]
                },
                manager: {
                    title: "REGIONAL<br>COMMAND.",
                    desc: "High-level analytics, macro-liquidity tracking, and risk assessment routing.",
                    actions: [
                        { icon: "📊", title: "Liquidity Map", desc: "View branch reserves across the sector." },
                        { icon: "⚠️", title: "Risk Dashboard", desc: "Monitor algorithmic fraud flags." },
                        { icon: "📋", title: "Audit Trail", desc: "Immutable history of all employee actions." }
                    ]
                },
                loan_manager: {
                    title: "CREDIT &<br>ASSETS.",
                    desc: "Evaluate collateral, process applications, and execute contract disbursements.",
                    actions: [
                        { icon: "📄", title: "Applications", desc: "Review queued credit and mortgage requests." },
                        { icon: "⚖️", title: "Collateral Check", desc: "Interface with external valuation APIs." },
                        { icon: "💰", title: "Disburse Funds", desc: "Release approved capital to client ledgers." }
                    ]
                },
                system_admin: {
                    title: "NETWORK<br>ARCHITECTURE.",
                    desc: "Root access to server nodes, security firewalls, and employee permission blocks.",
                    actions: [
                        { icon: "⚙️", title: "Node Status", desc: "Monitor blockchain and server health." },
                        { icon: "🛡️", title: "Firewall Ops", desc: "Review intrusion attempts and block IPs." },
                        { icon: "🔑", title: "Permissions", desc: "Reset employee hardware keys and access." }
                    ]
                }
            },

            // Change role and re-render
            switchRole(roleId) {
                this.currentRole = roleId;
                this.render('dashboard');
            },

            // Route between dashboard and action views
            render(view) {
                document.getElementById('view-dashboard').style.display = 'none';
                document.getElementById('view-action').style.display = 'none';

                if(view === 'dashboard') {
                    this.buildDashboard();
                    document.getElementById('view-dashboard').style.display = 'block';
                } else {
                    // It's an action view
                    const actionData = JSON.parse(decodeURIComponent(view));
                    document.getElementById('action-title').innerHTML = actionData.title.replace(' ', '<br>');
                    document.getElementById('action-desc').innerText = actionData.desc;
                    document.getElementById('view-action').style.display = 'block';
                }
            },

            // Construct the grid dynamically
            buildDashboard() {
                const data = this.roles[this.currentRole];
                
                // Update Hero
                document.getElementById('hero-title').innerHTML = data.title;
                document.getElementById('hero-desc').innerText = data.desc;

                // Build Bento Grid
                const grid = document.getElementById('bento-grid');
                grid.innerHTML = ''; // Clear

                data.actions.forEach((action, index) => {
                    // Assign colors in sequence (Purple -> Mint -> Peach -> etc)
                    const colorClass = this.colorSequence[index % this.colorSequence.length];
                    const actionString = encodeURIComponent(JSON.stringify(action));

                    grid.innerHTML += `
                        <div class="bento-card ${colorClass}" onclick="app.render('${actionString}')">
                            <div class="bento-icon">${action.icon}</div>
                            <h3>${action.title}</h3>
                            <p>${action.desc}</p>
                        </div>
                    `;
                });
            }
        };

        // Initialize App
        window.onload = () => app.render('dashboard');
    </script>
</body>
</html>
